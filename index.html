<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evu-Beta | MD Ibrahim Kholil</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <style>
        body { font-family: 'Arial', sans-serif; background: #f0f2f5; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; flex-direction: column; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; }
        button { width: 95%; padding: 12px; background: #0d6efd; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; }
        button:hover { background: #0b5ed7; }
        .toggle-link { color: #0d6efd; cursor: pointer; margin-top: 15px; display: block; text-decoration: none; font-size: 14px; }
        #portfolio-section { display: none; width: 95%; max-width: 800px; text-align: center; }
        header { background: #0d6efd; color: white; padding: 40px; border-radius: 15px; margin-bottom: 20px; }
        .card { background: white; margin: 15px 0; padding: 25px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    </style>
</head>
<body>

    <div id="auth-section" class="container">
        <h2 id="auth-title">লগইন করুন</h2>
        <input type="email" id="email" placeholder="আপনার ইমেইল">
        <input type="password" id="password" placeholder="পাসওয়ার্ড (কমপক্ষে ৬ ডিজিট)">
        <button id="auth-btn" onclick="handleAuth()">লগইন</button>
        <a class="toggle-link" onclick="toggleAuth()">অ্যাকাউন্ট নেই? রেজিস্ট্রেশন করুন</a>
        <p id="msg" style="color: red; font-size: 14px; margin-top: 10px;"></p>
    </div>

    <div id="portfolio-section">
        <header>
            <h1>MD Ibrahim Kholil</h1>
            <p>Future Cyber Security Expert</p>
            <button onclick="logout()" style="background: #dc3545; width: auto; padding: 8px 15px; font-size: 12px; margin-top: 10px;">Logout</button>
        </header>

        <section>
            <div class="card">
                <h2>About Me</h2>
                <p>আমি খাগড়াছড়ি থেকে একজন ছাত্র। বর্তমানে আমি সাইবার সিকিউরিটি এবং ইথিক্যাল হ্যাকিং শিখছি।</p>
            </div>
            <div class="card">
                <h2>Contact</h2>
                <p>ইমেইল: <a href="mailto:ibrahim71kholil@email.com">ibrahim71kholil@email.com</a></p>
                <a href="https://www.facebook.com/Ibrahim.Official.Profile" target="_blank" style="text-decoration:none; color:white; background:#1877F2; padding:10px 20px; border-radius:5px; display:inline-block; margin-top:10px;">Facebook</a>
            </div>
        </section>
    </div>

    <script>
        // আপনার Firebase কনফিগারেশন (সঠিকভাবে সাজানো)
        const firebaseConfig = {
            apiKey: "AIzaSyCEgnFT8a-Dbik2W6JqpPB8-Pw1WfnecE",
            authDomain: "evu-8921a.firebaseapp.com",
            projectId: "evu-8921a",
            storageBucket: "evu-8921a.appspot.com",
            messagingSenderId: "777966469701",
            appId: "1:777966469701:web:a3c5490e93f43cb6df592c"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        let isLoginMode = true;

        function toggleAuth() {
            isLoginMode = !isLoginMode;
            document.getElementById("auth-title").innerText = isLoginMode ? "লগইন করুন" : "রেজিস্ট্রেশন করুন";
            document.getElementById("auth-btn").innerText = isLoginMode ? "লগইন" : "রেজিস্ট্রেশন";
            document.querySelector(".toggle-link").innerText = isLoginMode ? "অ্যাকাউন্ট নেই? রেজিস্ট্রেশন করুন" : "অ্যাকাউন্ট আছে? লগইন করুন";
        }

        function handleAuth() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const msg = document.getElementById("msg");

            if (isLoginMode) {
                auth.signInWithEmailAndPassword(email, password)
                    .catch(error => msg.innerText = "ভুল ইমেইল বা পাসওয়ার্ড!");
            } else {
                auth.createUserWithEmailAndPassword(email, password)
                    .then(() => alert("রেজিস্ট্রেশন সফল! এখন লগইন করুন।"))
                    .catch(error => msg.innerText = "ভুল: " + error.message);
            }
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById("auth-section").style.display = "none";
                document.getElementById("portfolio-section").style.display = "block";
            } else {
                document.getElementById("auth-section").style.display = "inline-block";
                document.getElementById("portfolio-section").style.display = "none";
            }
        });

        function logout() {
            auth.signOut();
        }
    </script>
</body>
</html>
